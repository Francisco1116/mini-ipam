apiVersion: apps/v1
kind: Deployment
metadata:
  name: mini-ipam-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mini-ipam
  template:
    metadata:
      labels:
        app: mini-ipam
    spec:
      containers:
      - name: mini-ipam
        image: mini-ipam:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080

---

apiVersion: v1
kind: Service
metadata:
  name: mini-ipam-service
spec:
  type: LoadBalancer 
  selector:
    app: mini-ipam
  ports:
    - port: 8080       
      targetPort: 8080 